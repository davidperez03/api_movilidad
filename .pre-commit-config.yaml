repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key          # Bloquea claves privadas SSH/RSA
      - id: check-added-large-files     # Bloquea archivos > 500 KB
        args: [--maxkb=500]
      - id: check-merge-conflict        # Bloquea marcadores de conflicto Git
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets              # Detecta secrets hardcodeados
        args: [--baseline, .secrets.baseline]
        exclude: .env.example

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-tabs
